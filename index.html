<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sleepy Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <!-- Org username is sleepy-studio -->
    <a class="logo-link" href="https://github.com/sleepy-studio" target="_blank" rel="noopener">
      <img class="logo" src="https://github.com/sleepy-studio.png?size=200" alt="Sleepy Studio logo" />
    </a>
    <h1 class="site-title">Sleepy Studio</h1>
    <p class="site-tagline">Dream in code.</p>
  </header>

  <main class="content">
    <section class="hero">
      <h2>Welcome</h2>
      <p>This is the Sleepy Studio org page — simple, bold, and accessible.</p>
    </section>

    <section class="links">
      <a class="btn" href="https://github.com/sleepy-studio" target="_blank" rel="noopener">View our GitHub</a>
      <a class="btn ghost" href="#contact">Contact</a>
    </section>
  </main>

  <footer class="site-footer" id="contact">
    <p>© <span id="year"></span> Sleepy Studio</p>
  </footer>

  <script>
    // set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
