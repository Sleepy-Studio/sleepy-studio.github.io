<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sleepy Studio</title>
  <link rel="icon" href="https://github.com/sleepy-studio.png?size=200" type="image/png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo-link" href="https://github.com/sleepy-studio" target="_blank" rel="noopener">
      <img class="logo" src="https://github.com/sleepy-studio.png?size=200" alt="Sleepy Studio logo" />
    </a>
    <h1 class="site-title">Sleepy Studio</h1>
  </header>

  <main class="content" role="main">
    <section class="social" aria-label="Sponsor, follow, and website">
      <div class="social-buttons" role="group" aria-labelledby="social-heading">
        <h2 id="social-heading" class="visually-hidden">Sponsor, follow, and website</h2>

        <a class="btn sponsor-btn" href="https://github.com/sponsors/sleepy-studio" target="_blank" rel="noopener" aria-label="Sponsor Sleepy Studio on GitHub">
          <!-- GitHub mark (octocat) -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.09-.744.084-.729.084-.729 1.205.084 1.84 1.236 1.84 1.236 1.07 1.834 2.809 1.304 3.495.997.108-.776.418-1.305.76-1.604-2.665-.304-5.466-1.332-5.466-5.93 0-1.31.468-2.38 1.235-3.22-.135-.303-.54-1.524.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.652.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.922.429.37.81 1.096.81 2.21 0 1.596-.015 2.884-.015 3.276 0 .315.21.697.825.577C20.565 22.092 24 17.592 24 12.297 24 5.67 18.627.297 12 .297z"/>
          </svg>
          <span class="label">Sponsor on GitHub</span>
        </a>

        <a class="btn x-btn" href="https://x.com/TheSleepyStudio" target="_blank" rel="noopener" aria-label="Follow Sleepy Studio on X">
          <!-- X (formerly Twitter) logo -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M18.36 6.64a1 1 0 0 0-1.414 0L12 11.586 7.05 6.636A1 1 0 1 0 5.636 8.05L10.586 13l-4.95 4.95a1 1 0 1 0 1.414 1.414L12 14.414l4.95 4.95a1 1 0 0 0 1.414-1.414L13.414 13l4.95-4.95a1 1 0 0 0 0-1.414z"/>
          </svg>
          <span class="label">Follow on X</span>
        </a>

        <a class="btn" href="https://sleepystudio.xyz" target="_blank" rel="noopener" aria-label="Visit Sleepy Studio website">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 14.5v-2.1c1.3-.2 2.3-1.2 2.5-2.5H17c-.2 1.8-1.6 3.2-3.5 3.6zM8.5 11H6.8c.2 1.3 1.2 2.3 2.5 2.5V13.5c-1.9-.4-3.3-1.8-3.5-3.6h1.9c.2 1.3 1.2 2.3 2.5 2.5V13.5c-1.9-.4-3.3-1.8-3.5-3.6H8.5z"/>
          </svg>
          <span class="label">Visit our website</span>
        </a>

      </div>
    </section>
  </main>

  <footer class="site-footer">
  </footer>

  <script>
    const year = document.getElementById('year');
    if (year) year.textContent = new Date().getFullYear();

    const logo = document.querySelector('.logo-link');
    const ctaButtons = document.querySelectorAll('.btn');
    const title = document.querySelector('.site-title');
    const ctaGroup = document.querySelector('.social-buttons');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

    function updateLogoOverlaps() {
      if (!logo || reducedMotion.matches) {
        ctaButtons.forEach((button) => button.classList.remove('is-logo-overlapping'));
      } else {
        const logoBounds = logo.getBoundingClientRect();

        ctaButtons.forEach((button) => {
          const buttonBounds = button.getBoundingClientRect();
          const overlaps =
            logoBounds.left < buttonBounds.right &&
            logoBounds.right > buttonBounds.left &&
            logoBounds.top < buttonBounds.bottom &&
            logoBounds.bottom > buttonBounds.top;

          button.classList.toggle('is-logo-overlapping', overlaps);
        });
      }

      requestAnimationFrame(updateLogoOverlaps);
    }

    requestAnimationFrame(updateLogoOverlaps);

    function startTitleJourney() {
      if (!title || !ctaGroup || reducedMotion.matches) return;

      const titleBounds = title.getBoundingClientRect();
      const ctaBounds = ctaGroup.getBoundingClientRect();
      const titleScale = 1.45;
      const bottomMargin = 24;
      const titleCenterX = titleBounds.left + titleBounds.width / 2;
      const titleCenterY = titleBounds.top + titleBounds.height / 2;
      const targetCenterX = ctaBounds.left + ctaBounds.width / 2;
      const targetCenterY =
        ctaBounds.top - bottomMargin - (titleBounds.height * titleScale) / 2;

      title.style.setProperty('--title-shift-x', `${targetCenterX - titleCenterX}px`);
      title.style.setProperty('--title-shift-y', `${targetCenterY - titleCenterY}px`);
      title.classList.add('is-logo-bouncing');
    }

    setTimeout(startTitleJourney, 2000);
  </script>
</body>
</html>
